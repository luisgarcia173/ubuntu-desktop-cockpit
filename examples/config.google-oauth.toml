[app]
name = "Desktop Cockpit"
refresh_interval_seconds = 5

[window]
width = 900
height = 760
monitor = 1
position = "top-right"
margin_top = 32
margin_right = 24
opacity = 0.92
always_on_top = false

[theme]
font_family = "JetBrains Mono"
font_size = 13
border_radius = 16
padding = 16

[ui]
display_profile = "plain"
show_sound_test_button = false

[calendar]
provider = "google-oauth"

[calendar.google_oauth]
ccalendar_id = "primary"
calendar_ids = ["primary"]
include_tasks_today = true
credentials_file = "credentials/credentials.json"
# client_id = "your-google-client-id.apps.googleusercontent.com"
# client_secret = "your-google-client-secret"
refresh_token = "your-google-refresh-token"

[sections]
show_clock = true
show_events = true
show_tasks = true
show_system = true
show_shortcuts = true

[notes]
daily_file = "examples/today.example.md"

# Eventos locais opcionais: mantidos como fallback visual quando trocar provider para "local".
[[events]]
time = "09:00"
title = "Revisar Aulas/Mentoria"
description = "Mentoria Java"

[[events]]
time = "19:00"
title = "Treino: Vôlei"
description = "Vôlei"

[[shortcuts]]
label = "IntelliJ"
command = "$HOME/.local/share/JetBrains/Toolbox/scripts/idea || idea || intellij-idea-ultimate || intellij-idea-community || flatpak run com.jetbrains.IntelliJ-IDEA-Ultimate || flatpak run com.jetbrains.IntelliJ-IDEA-Community"

[[shortcuts]]
label = "VS Code"
command = "code"

[[shortcuts]]
label = "Chrome"
command = "google-chrome"

[[shortcuts]]
label = "Podman"
command = "podman-desktop || flatpak run io.podman_desktop.PodmanDesktop"

